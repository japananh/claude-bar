name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false  # we manage caches explicitly below

      - name: Show toolchain versions
        run: |
          sw_vers
          xcodebuild -version
          swift --version
          go version

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/Library/Caches/go-build
          key: ${{ matrix.os }}-go-${{ hashFiles('backend/go.sum') }}
          restore-keys: |
            ${{ matrix.os }}-go-

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: widget/.build
          key: ${{ matrix.os }}-spm-${{ hashFiles('widget/Package.resolved', 'widget/Package.swift') }}
          restore-keys: |
            ${{ matrix.os }}-spm-

      - name: Run tests
        run: make test

      - name: Upload SwiftPM diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: swift-build-logs-${{ matrix.os }}
          path: |
            widget/.build/**/*.log
            widget/.build/**/output-file-map.json
          if-no-files-found: ignore
          retention-days: 7
