name: Bump Homebrew tap

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish to tap (e.g. v7.3)"
        required: true

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag and version
        id: ver
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          if [ -z "$TAG" ]; then
            echo "No tag provided" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.ver.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "ClaudeBar.zip" \
            --output ClaudeBar.zip

      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(sha256sum ClaudeBar.zip | cut -d' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: ncthanhngo/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update cask
        working-directory: homebrew-tap
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          CASK=Casks/claude-bar.rb
          python3 - "$CASK" "$VERSION" "$SHA256" <<'PY'
          import re, sys, pathlib
          path, version, sha = sys.argv[1:]
          p = pathlib.Path(path)
          text = p.read_text()
          text = re.sub(r'version "[^"]+"', f'version "{version}"', text, count=1)
          text = re.sub(r'sha256 "[^"]+"', f'sha256 "{sha}"', text, count=1)
          p.write_text(text)
          PY
          git diff --exit-code "$CASK" && { echo "No changes — already at $VERSION"; exit 0; } || true
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$CASK"
          git commit -m "feat: update claude-bar to v${VERSION}"
          git push origin HEAD:main
