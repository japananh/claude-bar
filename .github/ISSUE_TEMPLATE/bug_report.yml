name: Bug Report
description: Report something that isn't working as expected.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: checkboxes
    attributes:
      label: Search for existing reports
      description: Please search open and closed [issues](../issues?q=is%3Aissue) before filing a new one.
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
  - type: textarea
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: When I switch accounts, ...
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Steps to reliably reproduce the behavior.
      placeholder: |
        1. Open the menu bar icon
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
      placeholder: What you expected to happen instead.
    validations:
      required: false
  - type: dropdown
    attributes:
      label: Area
      description: Which part of Claude Bar is affected?
      options:
        - Account switching
        - Auto-swap
        - Usage display / token chart
        - IDE reload
        - CLI auto-restart (claude-watch)
        - Local MCP connectors
        - iCloud sync
        - Other / not sure
    validations:
      required: true
  - type: input
    id: app_version
    attributes:
      label: Claude Bar version
      description: Shown in the app's About / Settings.
      placeholder: e.g. 11.10
    validations:
      required: true
  - type: input
    id: macos_version
    attributes:
      label: macOS version
      placeholder: e.g. 14.5 (Sonoma)
    validations:
      required: true
  - type: textarea
    attributes:
      label: Additional context
      description: Screenshots, screen recordings, logs, or crash reports that might help.
      placeholder: Drag-and-drop images or paste logs here.
    validations:
      required: false
