name: Feature Request
description: Suggest an idea or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: checkboxes
    attributes:
      label: Search for existing requests
      description: Please search open and closed [issues](../issues?q=is%3Aissue) before filing a new one.
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
  - type: textarea
    attributes:
      label: Problem
      description: What problem would this feature solve? What are you trying to do?
      placeholder: I'm always frustrated when ...
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed solution
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Alternatives considered
      placeholder: Other approaches or workarounds you've tried.
    validations:
      required: false
  - type: textarea
    attributes:
      label: Additional context
      placeholder: Mockups, links, or anything else that helps explain the request.
    validations:
      required: false
